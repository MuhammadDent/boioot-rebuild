# fly.toml — backend-bold-snowflake-8206
# See https://fly.io/docs/reference/configuration/

app            = 'backend-bold-snowflake-8206'
primary_region = 'fra'

[build]
  dockerfile = "Dockerfile"

[[services]]
  internal_port = 8080
  protocol      = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port     = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port     = 443

  [services.concurrency]
    type       = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory    = '1gb'
  cpu_kind  = 'shared'
  cpus      = 1
  memory_mb = 1024
